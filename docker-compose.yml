services:
  app:
    build: .
    command: ["--start-server"]
    ports:
      - "8080:8080"
    volumes:
      - ./config.jsonc:/app/config.jsonc:ro
    depends_on:
      postgres:
        condition: service_started
      milvus:
        condition: service_started
      embed-service:
        condition: service_healthy
    develop:
      watch:
        - action: rebuild
          path: .
          ignore:
            - volumes/
            - images/
            - embed_server/
            - config.jsonc

  # Postgres can be accessed outside docker at
  # postgresql://vend:vend@localhost:7843/vend
  postgres:
    image: postgres:18
    environment:
      POSTGRES_USER: vend
      POSTGRES_PASSWORD: vend
      POSTGRES_DB: vend
      PGPORT: 7843
    volumes:
      - ./volumes/postgres:/var/lib/postgresql
    ports:
      - "7843:7843"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vend"]
      interval: 10s
      timeout: 5s
      retries: 5

  etcd:
    container_name: milvus-etcd
    image: quay.io/coreos/etcd:v3.6.10
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
      - ETCD_LOG_LEVEL=warn
    volumes:
      - ./volumes/etcd:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    ports:
      - "2379:2379"
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3

  minio:
    container_name: milvus-minio
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_LOG_LEVEL: warn
    volumes:
      - ./volumes/minio:/minio_data
    command: minio server /minio_data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # Port mapping must match milvus_port in config.jsonc.
  milvus:
    container_name: milvus-standalone
    image: milvusdb/milvus:v2.6.15
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - ./volumes/milvus:/var/lib/milvus
      - ./milvus.yaml:/milvus/configs/milvus.yaml:ro
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      - etcd
      - minio
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 20s
      retries: 3

  # Port mapping and model are driven by config.jsonc (embed_service_port,
  # japan.askul.embed_model). config.jsonc is mounted read-only at /app/config.jsonc.
  embed-service:
    build: ./embed_server
    init: true
    volumes:
      - ./config.jsonc:/app/config.jsonc:ro
    ports:
      - "5936:5936"
    healthcheck:
      # Waiting on health here rather than in the app.
      # Since the app depends on this largely at all times.
      test: ["CMD", "curl", "-f", "http://localhost:5936/health"]
      interval: 30s
      timeout: 5s
      retries: 10
